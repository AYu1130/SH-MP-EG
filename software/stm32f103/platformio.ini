; =============================================================================
; STM32F103 BLE 节点 PlatformIO 配置
;
; 硬件平台: 正点原子 战舰V4 开发板 (STM32F103ZET6)
; 传输:     USART2 (PA2 TX / PA3 RX)  <-->  HM-10 BLE 模块 (默认 9600 N81 透传)
; 感知:     GY-302(BH1750) I²C — PB7=SDA / PB6=SCL，与板载 24C02 共总线
; 执行:     PE0 R / PE1 G / PE2 B - 5050 RGB LED (共阴驱动，高电平亮)
; 烧录:     ST-Link V2 (SWD)，也可改 upload_protocol = serial 用板载 CH340
; =============================================================================
[platformio]
default_envs = warship_f103ze

[env:warship_f103ze]
platform        = ststm32
board           = genericSTM32F103ZE
framework       = arduino
upload_protocol = stlink
debug_tool      = stlink
monitor_speed   = 115200

; ArduinoJson 用于上下行 JSON 报文构造/解析
lib_deps =
  bblanchon/ArduinoJson@^7.2.2

; ---------- 编译期可调参数 ----------
;  - HSE_VALUE=8000000           : 战舰V4 的外部晶振 8MHz
;  - ENABLE_HWSERIAL2            : 启用 Serial2 (USART2, PA2/PA3)，
;                                  Arduino_Core_STM32 默认未开，必须显式打开
;  - PIO_FRAMEWORK_ARDUINO_ENABLE_CDC 不设，战舰V4 不使用 USB-CDC，
;                                  调试串口走 USART1 (PA9/PA10) -> CH340 -> USB
;  可选: -DLIGHT_LUX_DARK_MAX=50.0f  覆盖判暗阈值 (lx)
build_flags =
  -D HSE_VALUE=8000000
  -D ENABLE_HWSERIAL1
  -D ENABLE_HWSERIAL2
  -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC=0
