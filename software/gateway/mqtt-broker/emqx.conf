## =============================================================================
## SH-MP-EG EMQX 5.x Configuration (HOCON 格式)
##
## 该文件会被 docker-compose 挂载到 /opt/emqx/etc/emqx.conf 覆盖默认配置。
## 仅列出本项目关心的关键选项；未指定的项均使用镜像默认值。
## 参考: https://docs.emqx.com/en/emqx/latest/configuration/configuration.html
## =============================================================================

node {
  name    = "shmpeg@127.0.0.1"
  cookie  = "shmpeg_secret_cookie"
  data_dir = "/opt/emqx/data"
}

cluster {
  name      = "shmpeg"
  discovery_strategy = "manual"   ## 单节点部署
}

## -------- 监听器 -----------------------------------------------------------
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 10000
}

listeners.ws.default {
  bind = "0.0.0.0:8083"
  websocket.mqtt_path = "/mqtt"
}

## Dashboard（Web 管理页）
dashboard {
  listeners.http {
    bind = 18083
  }
  default_username = "admin"
  ## 首次登录后务必修改默认密码
  default_password = "public"
}

## -------- 鉴权 / 授权 -------------------------------------------------------
## 实验室环境：允许匿名；生产部署需改为 false 并配置 JWT / built-in DB。
authentication = []
authorization {
  no_match = "allow"
  deny_action = "ignore"
  cache { enable = true }
}

## -------- 日志 -------------------------------------------------------------
log {
  console_handler {
    enable = true
    level = warning
  }
  file_handlers.default {
    enable = true
    level = info
    file = "/opt/emqx/log/emqx.log"
    rotation { count = 10 }
    max_size = "50MB"
  }
}

## -------- 性能相关（树莓派 4B / 2 核或 4 核都够用） ------------------------
mqtt {
  max_packet_size = "1MB"
  max_qos_allowed = 2
  keepalive_multiplier = 1.5
  retain_available = true
}
